# https://goreleaser.com
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2
project_name: taskkit
before:
  hooks:
    - go mod tidy
builds:
  - id: "taskkit"
    main: "./cmd/taskkit/"
    env:
      - CGO_ENABLED=0
    flags:
      - "-buildvcs" # include VCS information
    gcflags:
      - "all=-l -C" # disable function inlining, error message column printing
    ldflags:
      - "-s -w" # disable symbol table, DWARF generation
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin # do not use universal binaries - they triple the artifact size
      - linux
      - windows
    ignore:
      - goos: linux
        goarch: "386"
      - goos: windows
        goarch: "arm64"
      - goos: windows
        goarch: "386"
archives:
  - formats: ["tar.gz"]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
    format_overrides:
      - goos: windows
        formats: ["zip"]
changelog:
  disable: true
release:
  mode: keep-existing
  github:
    owner: hugginsio
    name: taskkit
  target_commitish: "{{ .Commit }}"
homebrew_casks:
  - description: "Task"
    repository:
      owner: hugginsio
      name: homebrew-tap
    homepage: "https://huggins.dev/taskkit"
    hooks:
      post:
        install: |-
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/taskkit"]
          end
